  <script>
  document.addEventListener('DOMContentLoaded', function () {
    var BATCH = 6;
    var allWrappers = Array.prototype.slice.call(document.querySelectorAll('.tweet-wrapper'));
    var countEl = document.querySelector('.tweet-count');
    var btn = document.querySelector('.show-more-btn');
    var shown = BATCH;

    allWrappers.forEach(function (w, i) {
      w.style.display = i < shown ? '' : 'none';
    });
    if (countEl) countEl.textContent = allWrappers.length + ' Wallpaper Set';
    btn.style.display = shown >= allWrappers.length ? 'none' : '';
    if (window.twttr && twttr.widgets) twttr.widgets.load();

    btn.addEventListener('click', function () {
      var next = shown + BATCH;
      allWrappers.forEach(function (w, i) {
        if (i < next) w.style.display = '';
      });
      shown = next;
      if (window.twttr && twttr.widgets) twttr.widgets.load();
      if (shown >= allWrappers.length) btn.style.display = 'none';
    });
  });
  </script>
