  <script>
  document.addEventListener('DOMContentLoaded', function () {
    var BATCH = 6;
    var allWrappers = Array.prototype.slice.call(document.querySelectorAll('.tweet-wrapper'));
    var countEl = document.querySelector('.tweet-count');
    var btn = document.querySelector('.show-more-btn');
    var artistFilter = document.getElementById('artist-filter');
    var yearFilter = document.getElementById('year-filter');
    var visible = [];
    var shown = 0;

    function loadTweet(wrapper) {
      if (wrapper.dataset.loaded) return;
      var id = wrapper.dataset.tweetId;
      if (!id) return;
      var bq = document.createElement('blockquote');
      bq.className = 'twitter-tweet';
      var a = document.createElement('a');
      a.href = 'https://x.com/delightfulMooN_/status/' + id;
      bq.appendChild(a);
      wrapper.appendChild(bq);
      wrapper.dataset.loaded = '1';
    }

    function loadVisibleTweets() {
      var needsLoad = false;
      visible.forEach(function (w, i) {
        if (i < shown && !w.dataset.loaded) {
          loadTweet(w);
          needsLoad = true;
        }
      });
      if (needsLoad && window.twttr && twttr.widgets) twttr.widgets.load();
    }

    function applyFilter() {
      var artist = artistFilter.value;
      if (artist === '' || artist === 'All') artist = 'All';
      var year = yearFilter.value;
      visible = allWrappers.filter(function (w) {
        var matchArtist = artist === 'All' || w.getAttribute('data-artist') === artist;
        var matchYear = year === 'All' || w.getAttribute('data-year') === year;
        return matchArtist && matchYear;
      });
      shown = BATCH;
      allWrappers.forEach(function (w) { w.style.display = 'none'; });
      visible.forEach(function (w, i) {
        w.style.display = i < shown ? '' : 'none';
      });
      if (countEl) countEl.textContent = visible.length + ' Wallpaper Set';
      btn.style.display = shown >= visible.length ? 'none' : '';
      loadVisibleTweets();
    }

    artistFilter.addEventListener('change', applyFilter);
    yearFilter.addEventListener('change', applyFilter);

    btn.addEventListener('click', function () {
      var next = shown + BATCH;
      visible.forEach(function (w, i) {
        if (i < next) w.style.display = '';
      });
      shown = next;
      loadVisibleTweets();
      if (shown >= visible.length) btn.style.display = 'none';
    });

    applyFilter();
  });
  </script>
